# Local development stack: PostgreSQL + Adminer (DB explorer UI).
#   Postgres:  localhost:5432  (user=postgres password=postgres db=support_console)
#   Adminer:   http://localhost:8080  (System=PostgreSQL, Server=postgres, User=postgres, Password=postgres)
# A second database `support_console_test` is created for the integration/concurrency tests.
services:
  postgres:
    image: postgres:16-alpine
    container_name: support_console_pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: support_console
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d support_console"]
      interval: 5s
      timeout: 5s
      retries: 20

  adminer:
    image: adminer:latest
    container_name: support_console_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
